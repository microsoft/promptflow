# Conda environment for the MAF PRS parallel component.
#
# The PF runtime image was inherited automatically when using
# `load_component(flow.dag.yaml)`.  For MAF we declare the env explicitly.
# Add any packages your workflow imports below the marked section.
name: maf-prs-env
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      # --- AML PRS runtime requirements ---
      - azureml-core
      - azureml-mlflow
      - azureml-dataset-runtime
      - mldesigner
      - mltable>=1.2.0
      # `setuptools<80` is required because setuptools 80+ removed the
      # bundled `pkg_resources` module, and `azureml-dataprep` (transitive
      # dep of `mltable`) imports `pkg_resources` at module load.  Without
      # this pin, PRS fails every mini-batch with the misleading
      # "RequireMLTablePackageException" — the real cause is
      # `ModuleNotFoundError: No module named 'pkg_resources'`.
      # See gotchas.md #14.
      - setuptools<80
      - pandas
      # --- Microsoft Agent Framework (GA) ---
      - agent-framework>=1.0.1
      - agent-framework-openai>=1.0.1
      - azure-identity
      # --- Optional: Application Insights tracing (see maf-tracing skill) ---
      - azure-monitor-opentelemetry
      # --- CUSTOMISE: your workflow's extra dependencies -------------------
      # - azure-ai-projects        # if the workflow targets a Foundry project
      # - azure-search-documents   # if the workflow uses Azure AI Search
      # - <your-internal-package>
      # ---------------------------------------------------------------------
